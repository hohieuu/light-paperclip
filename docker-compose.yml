services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: agilo
      POSTGRES_PASSWORD: agilo
      POSTGRES_DB: agilo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agilo -d agilo"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://agilo:agilo@db:5432/agilo
      PORT: "3100"
      SERVE_UI: "true"
      AGILO_DEPLOYMENT_MODE: "authenticated"
      AGILO_DEPLOYMENT_EXPOSURE: "private"
      AGILO_PUBLIC_URL: "${AGILO_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - agilo-data:/agilo
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  agilo-data:
